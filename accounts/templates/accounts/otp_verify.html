<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: gradientFlow 15s ease infinite;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animated background particles */
        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: particleFloat 20s infinite;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(0) translateX(0);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(100px);
            }
        }

        .blob {
            position: fixed;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: white;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            top: -100px;
            left: -100px;
            animation: blobMove 15s infinite ease-in-out;
        }

        .blob-2 {
            width: 350px;
            height: 350px;
            background: white;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            bottom: -50px;
            right: -50px;
            animation: blobMove 20s infinite ease-in-out reverse;
        }

        @keyframes blobMove {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -30px); }
            66% { transform: translate(-20px, 20px); }
        }

        .otp-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
        }

        .otp-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            animation: containerSlide 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid rgba(255, 255, 255, 0.4);
            position: relative;
        }

        @keyframes containerSlide {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.85);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .glass-glow {
            position: absolute;
            top: -150px;
            right: -150px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.2), transparent);
            border-radius: 50%;
            filter: blur(60px);
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { 
                transform: scale(1);
                opacity: 0.5;
            }
            50% { 
                transform: scale(1.3);
                opacity: 0.8;
            }
        }

        .header-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            padding: 60px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.15), transparent);
            animation: lightShift 3s ease-in-out infinite;
        }

        @keyframes lightShift {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .lock-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: lockBounce 2.5s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
            display: inline-block;
            filter: drop-shadow(0 8px 20px rgba(102, 126, 234, 0.4));
            position: relative;
            z-index: 1;
        }

        @keyframes lockBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        .header-title {
            color: white;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 12px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
            letter-spacing: -1px;
        }

        .header-subtitle {
            color: rgba(255, 255, 255, 0.95);
            font-size: 14px;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .timer-display {
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            font-weight: 600;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .timer-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                opacity: 1;
                transform: scale(1);
            }
            50% { 
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        .form-wrapper {
            padding: 50px 35px;
            position: relative;
            z-index: 2;
        }

        .info-text {
            text-align: center;
            color: #555;
            font-size: 13px;
            margin-bottom: 30px;
            line-height: 1.8;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .otp-inputs-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.2s backwards;
        }

        .otp-input {
            width: 50px;
            height: 60px;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, #f8f9ff 0%, #f5f7ff 100%);
            font-family: 'Courier New', monospace;
            cursor: text;
        }

        .otp-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 5px rgba(102, 126, 234, 0.15);
            transform: translateY(-4px) scale(1.05);
            background: white;
        }

        .otp-input:valid {
            border-color: #667eea;
            background: white;
        }

        .otp-input::placeholder {
            color: #bdc3c7;
        }

        .otp-input:disabled {
            background: #f0f0f0;
            color: #999;
            cursor: not-allowed;
        }

        .alternative-input {
            display: none;
            margin-bottom: 20px;
        }

        .alternative-input.show {
            display: block;
            animation: slideUp 0.4s ease-out;
        }

        .otp-text-input {
            width: 100%;
            padding: 16px 20px;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            transition: all 0.4s ease;
            background: linear-gradient(135deg, #f8f9ff 0%, #f5f7ff 100%);
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
            text-align: center;
        }

        .otp-text-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 5px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
            background: white;
        }

        .toggle-input-mode {
            text-align: center;
            margin: 15px 0;
            font-size: 12px;
        }

        .toggle-input-mode button {
            background: none;
            border: none;
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: underline;
        }

        .toggle-input-mode button:hover {
            color: #764ba2;
        }

        .verify-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1.2px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.35);
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.3s backwards;
        }

        .verify-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.6s;
            z-index: 1;
        }

        .verify-btn:hover::before {
            left: 100%;
        }

        .verify-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 45px rgba(102, 126, 234, 0.45);
            background-position: 200% center;
        }

        .verify-btn:active {
            transform: translateY(-2px);
        }

        .verify-btn:disabled {
            opacity: 0.6;
            pointer-events: none;
            cursor: not-allowed;
        }

        .verify-btn.loading {
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .resend-section {
            text-align: center;
            padding-top: 25px;
            border-top: 1px solid #e0e0e0;
            color: #555;
            font-size: 13px;
            position: relative;
            z-index: 2;
        }

        .resend-btn {
            background: none;
            border: none;
            color: #667eea;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0;
            margin-top: 8px;
        }

        .resend-btn:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .resend-btn:disabled {
            color: #bdc3c7;
            cursor: not-allowed;
        }

        .resend-counter {
            color: #667eea;
            font-weight: 700;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            animation: progressAnimation 30s linear forwards;
        }

        @keyframes progressAnimation {
            from { width: 100%; }
            to { width: 0%; }
        }

        .success-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            animation: successPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            z-index: 1000;
            pointer-events: none;
        }

        @keyframes successPop {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .error-message {
            display: none;
            padding: 12px 15px;
            background: linear-gradient(135deg, rgba(255, 71, 87, 0.1), rgba(255, 154, 158, 0.1));
            border-left: 4px solid #e74c3c;
            border-radius: 8px;
            color: #e74c3c;
            font-size: 13px;
            margin-bottom: 20px;
            animation: slideDown 0.4s ease-out;
        }

        .error-message.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .otp-container {
                border-radius: 25px;
            }

            .header-section {
                padding: 45px 25px;
            }

            .header-title {
                font-size: 28px;
            }

            .form-wrapper {
                padding: 40px 25px;
            }

            .otp-input {
                width: 44px;
                height: 50px;
                font-size: 20px;
            }

            .otp-inputs-container {
                gap: 10px;
            }

            .verify-btn {
                padding: 14px;
            }

            .lock-icon {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="particle-container" id="particles"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="otp-wrapper">
        <div class="otp-container">
            <div class="glass-glow"></div>

            <!-- Header -->
            <div class="header-section">
                <div class="lock-icon">🔒</div>
                <h2 class="header-title">Verify Your Identity</h2>
                <p class="header-subtitle">Enter the 6-digit code sent to your phone</p>
                <div class="timer-display">
                    <span class="timer-dot"></span>
                    <span id="timer">Code expires in <strong>10:00</strong></span>
                </div>
            </div>

            <!-- Form -->
            <form method="post" class="form-wrapper" id="otpForm">
                {% csrf_token %}

                <p class="info-text">
                    A verification code has been sent to your registered mobile number.
                </p>

                <!-- Error Message -->
                <div class="error-message" id="errorMessage">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText"></span>
                </div>

                <!-- OTP Input Fields -->
                <div class="otp-inputs-container" id="otpInputs">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                </div>

                <!-- Alternative Text Input -->
                <div class="alternative-input" id="alternativeInput">
                    <input type="text" class="otp-text-input" name="otp" placeholder="000000" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" id="otpTextInput">
                </div>

                <!-- Toggle Input Mode -->
                <div class="toggle-input-mode">
                    <button type="button" id="toggleMode">
                        <i class="fas fa-exchange-alt"></i> Enter as text
                    </button>
                </div>

                <!-- Hidden input for form submission -->
                <input type="hidden" name="otp" id="otpHidden">

                <!-- Verify Button -->
                <button type="submit" class="verify-btn" id="verifyBtn">
                    <span id="btnText">
                        <i class="fas fa-check"></i> Verify OTP
                    </span>
                </button>

                <div class="progress-bar" id="progressBar"></div>
            </form>

            <!-- Resend Section -->
            <div class="resend-section">
                <div>Didn't receive the code?</div>
                <button type="button" class="resend-btn" id="resendBtn" disabled>
                    Resend in <span class="resend-counter" id="resendTimer">60</span>s
                </button>
            </div>
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 20) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // OTP Input handling
        const otpInputs = document.querySelectorAll('.otp-input');
        const otpHidden = document.getElementById('otpHidden');
        const otpForm = document.getElementById('otpForm');
        const verifyBtn = document.getElementById('verifyBtn');
        const errorMessage = document.getElementById('errorMessage');
        const toggleMode = document.getElementById('toggleMode');
        const otpInputsContainer = document.getElementById('otpInputs');
        const alternativeInput = document.getElementById('alternativeInput');
        const otpTextInput = document.getElementById('otpTextInput');
        let isTextMode = false;

        // OTP Input validation
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const value = e.target.value;
                
                if (!/[0-9]/.test(value) && value !== '') {
                    e.target.value = '';
                    return;
                }

                if (value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }

                updateOTPValue();
                checkOTPComplete();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && input.value === '' && index > 0) {
                    otpInputs[index - 1].focus();
                }
                if (e.key === 'ArrowLeft' && index > 0) {
                    otpInputs[index - 1].focus();
                }
                if (e.key === 'ArrowRight' && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
                
                pastedData.split('').forEach((char, i) => {
                    if (i < otpInputs.length) {
                        otpInputs[i].value = char;
                    }
                });

                updateOTPValue();
                checkOTPComplete();
                otpInputs[Math.min(pastedData.length, otpInputs.length - 1)].focus();
            });
        });

        function updateOTPValue() {
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            otpHidden.value = otp;
        }

        function checkOTPComplete() {
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            verifyBtn.disabled = otp.length !== 6;
        }

        // Toggle input mode
        toggleMode.addEventListener('click', (e) => {
            e.preventDefault();
            isTextMode = !isTextMode;

            if (isTextMode) {
                otpInputsContainer.style.display = 'none';
                alternativeInput.classList.add('show');
                otpTextInput.focus();
                toggleMode.innerHTML = '<i class="fas fa-exchange-alt"></i> Use individual inputs';
            } else {
                otpInputsContainer.style.display = 'flex';
                alternativeInput.classList.remove('show');
                otpInputs[0].focus();
                toggleMode.innerHTML = '<i class="fas fa-exchange-alt"></i> Enter as text';
            }
        });

        // Alternative text input
        otpTextInput.addEventListener('input', (e) => {
            const value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
            e.target.value = value;
            otpHidden.value = value;
            verifyBtn.disabled = value.length !== 6;
        });

        // Form submission
        otpForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const otp = otpHidden.value;

            if (otp.length !== 6) {
                showError('Please enter a valid 6-digit OTP');
                return;
            }

            verifyBtn.classList.add('loading');
            verifyBtn.disabled = true;
            document.getElementById('btnText').innerHTML = '<span class="spinner"></span>Verifying...';

            // Simulate verification
            setTimeout(() => {
                // Assume success for demo
                showSuccess();
                
                // Reset button after animation
                setTimeout(() => {
                    verifyBtn.classList.remove('loading');
                    document.getElementById('btnText').innerHTML = '<i class="fas fa-check"></i> Verified!';
                }, 1500);
            }, 2000);
        });

        function showError(message) {
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorMessage.classList.add('show');

            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 4000);
        }

        function showSuccess() {
            const animation = document.createElement('div');
            animation.className = 'success-animation';
            animation.innerHTML = '✓';
            document.body.appendChild(animation);

            setTimeout(() => {
                animation.remove();
            }, 800);
        }

        // Timer functionality
        let timeRemaining = 600; // 10 minutes
        const timerDisplay = document.getElementById('timer');

        setInterval(() => {
            if (timeRemaining > 0) {
                timeRemaining--;
                const minutes = Math.floor(timeRemaining / 60);
                const seconds = timeRemaining % 60;
                timerDisplay.innerHTML = `Code expires in <strong>${minutes}:${seconds.toString().padStart(2, '0')}</strong>`;

                if (timeRemaining === 60) {
                    timerDisplay.style.color = '#e74c3c';
                }
            }
        }, 1000);

        // Resend OTP timer
        let resendCountdown = 60;
        const resendBtn = document.getElementById('resendBtn');
        const resendTimer = document.getElementById('resendTimer');

        resendBtn.addEventListener('click', (e) => {
            e.preventDefault();
            resendCountdown = 60;
            resendBtn.disabled = true;

            // Clear OTP inputs
            otpInputs.forEach(input => input.value = '');
            otpTextInput.value = '';
            otpHidden.value = '';
            checkOTPComplete();

            const countdown = setInterval(() => {
                resendCountdown--;
                resendTimer.textContent = resendCountdown;

                if (resendCountdown <= 0) {
                    clearInterval(countdown);
                    resendBtn.disabled = false;
                    resendTimer.textContent = '60';
                }
            }, 1000);
        });

        // Focus on first input
        otpInputs[0].focus();
    </script>
</body>
</html>
